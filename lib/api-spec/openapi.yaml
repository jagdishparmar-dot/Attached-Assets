openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Coldverse Supply Chain - Admin Panel API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard stats
  - name: deliveries
    description: Delivery management
  - name: drivers
    description: Driver management
  - name: vehicles
    description: Vehicle management
  - name: customers
    description: Customer management
  - name: staff
    description: Staff management (all roles)
  - name: attendance
    description: Attendance with geo-fencing
  - name: locations
    description: Live GPS tracking
  - name: hubs
    description: Warehouse/hub management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard summary statistics
      parameters:
        - in: query
          name: date
          schema:
            type: string
          description: Date filter (YYYY-MM-DD). Defaults to today.
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Get recent delivery activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /deliveries:
    get:
      operationId: listDeliveries
      tags: [deliveries]
      summary: List all deliveries
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, assigned, in_transit, delivered, failed, rescheduled]
        - in: query
          name: date
          schema:
            type: string
      responses:
        "200":
          description: List of deliveries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Delivery"
    post:
      operationId: createDelivery
      tags: [deliveries]
      summary: Create a new delivery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryInput"
      responses:
        "201":
          description: Delivery created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"
        "400":
          description: Validation error

  /deliveries/{id}:
    get:
      operationId: getDelivery
      tags: [deliveries]
      summary: Get a delivery by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Delivery detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"
        "404":
          description: Not found
    patch:
      operationId: updateDelivery
      tags: [deliveries]
      summary: Update a delivery (assign driver/vehicle, change status, etc.)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryUpdate"
      responses:
        "200":
          description: Updated delivery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"
        "404":
          description: Not found
    delete:
      operationId: deleteDelivery
      tags: [deliveries]
      summary: Delete a delivery
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /drivers:
    get:
      operationId: listDrivers
      tags: [drivers]
      summary: List all drivers
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, inactive]
      responses:
        "200":
          description: List of drivers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Driver"
    post:
      operationId: createDriver
      tags: [drivers]
      summary: Create a new driver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverInput"
      responses:
        "201":
          description: Driver created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /drivers/{id}:
    get:
      operationId: getDriver
      tags: [drivers]
      summary: Get a driver by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Driver detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
        "404":
          description: Not found
    patch:
      operationId: updateDriver
      tags: [drivers]
      summary: Update a driver
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverUpdate"
      responses:
        "200":
          description: Updated driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /vehicles:
    get:
      operationId: listVehicles
      tags: [vehicles]
      summary: List all vehicles
      responses:
        "200":
          description: List of vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"
    post:
      operationId: createVehicle
      tags: [vehicles]
      summary: Create a new vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleInput"
      responses:
        "201":
          description: Vehicle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  /vehicles/{id}:
    patch:
      operationId: updateVehicle
      tags: [vehicles]
      summary: Update a vehicle
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleUpdate"
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "404":
          description: Not found

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/bulk:
    post:
      operationId: bulkCreateCustomers
      tags: [customers]
      summary: Bulk create customers from an uploaded list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCustomerImport"
      responses:
        "200":
          description: Bulk import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkCustomerResult"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found

  # ── Staff ─────────────────────────────────────────────────────
  /staff/login:
    post:
      operationId: staffLogin
      tags: [staff]
      summary: Authenticate a staff member (mobile app login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffLoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffAuthResult"
        "401":
          description: Invalid credentials

  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff members
      parameters:
        - in: query
          name: role
          schema:
            type: string
            enum: [driver, picker, sorter, loader, supervisor, security, house_keeper]
        - in: query
          name: hub
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [active, inactive]
      responses:
        "200":
          description: List of staff
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Create a new staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffInput"
      responses:
        "201":
          description: Staff member created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "400":
          description: Validation error

  /staff/{id}:
    get:
      operationId: getStaffMember
      tags: [staff]
      summary: Get a staff member by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Staff member detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "404":
          description: Not found
    patch:
      operationId: updateStaffMember
      tags: [staff]
      summary: Update a staff member
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffUpdate"
      responses:
        "200":
          description: Updated staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
    delete:
      operationId: deleteStaffMember
      tags: [staff]
      summary: Delete a staff member
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Attendance ────────────────────────────────────────────────
  /attendance/checkin:
    post:
      operationId: checkIn
      tags: [attendance]
      summary: Mark check-in with GPS coordinates (geo-fenced)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceCheckin"
      responses:
        "200":
          description: Check-in recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceEntry"
        "400":
          description: Outside geofence or already checked in
        "404":
          description: Staff not found

  /attendance/checkout:
    post:
      operationId: checkOut
      tags: [attendance]
      summary: Mark check-out with GPS coordinates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceCheckout"
      responses:
        "200":
          description: Check-out recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceEntry"
        "400":
          description: Not checked in or already checked out
        "404":
          description: Staff not found

  /attendance/my:
    get:
      operationId: getMyAttendance
      tags: [attendance]
      summary: Get attendance history for a staff member
      parameters:
        - in: query
          name: staffId
          required: true
          schema:
            type: integer
        - in: query
          name: month
          schema:
            type: string
            description: YYYY-MM format
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceEntry"

  /attendance/all:
    get:
      operationId: getAllAttendance
      tags: [attendance]
      summary: Get all staff attendance for admin (optionally filter by date)
      parameters:
        - in: query
          name: date
          schema:
            type: string
            description: YYYY-MM-DD format
        - in: query
          name: hub
          schema:
            type: string
      responses:
        "200":
          description: All attendance records for the date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceEntry"

  # ── Live Tracking ─────────────────────────────────────────────
  /locations/ping:
    post:
      operationId: pingLocation
      tags: [locations]
      summary: Update staff GPS location (called from mobile every 30s)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationPing"
      responses:
        "200":
          description: Location updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffLocation"

  /locations:
    get:
      operationId: listActiveLocations
      tags: [locations]
      summary: Get current GPS location of all active staff (for admin map)
      parameters:
        - in: query
          name: hub
          schema:
            type: string
      responses:
        "200":
          description: Active staff locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffLocation"

  # ── Hubs ──────────────────────────────────────────────────────
  /hubs:
    get:
      operationId: listHubs
      tags: [hubs]
      summary: List all hubs with geofence coordinates
      responses:
        "200":
          description: List of hubs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hub"
    post:
      operationId: createHub
      tags: [hubs]
      summary: Create a new hub with geofence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HubInput"
      responses:
        "201":
          description: Hub created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hub"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DashboardStats:
      type: object
      required:
        - totalDeliveries
        - pendingDeliveries
        - assignedDeliveries
        - inTransitDeliveries
        - deliveredToday
        - failedToday
        - totalDrivers
        - activeDrivers
        - totalVehicles
        - availableVehicles
        - totalCustomers
        - staffPresent
        - staffAbsent
        - totalDeliveredValue
      properties:
        totalDeliveries:
          type: integer
        pendingDeliveries:
          type: integer
        assignedDeliveries:
          type: integer
        inTransitDeliveries:
          type: integer
        deliveredToday:
          type: integer
        failedToday:
          type: integer
        totalDrivers:
          type: integer
        activeDrivers:
          type: integer
        totalVehicles:
          type: integer
        availableVehicles:
          type: integer
        totalCustomers:
          type: integer
        staffPresent:
          type: integer
        staffAbsent:
          type: integer
        totalDeliveredValue:
          type: number

    ActivityItem:
      type: object
      required:
        - id
        - type
        - message
        - time
        - status
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [delivery_created, driver_assigned, vehicle_assigned, status_changed, delivery_completed, delivery_failed]
        message:
          type: string
        time:
          type: string
        status:
          type: string
        deliveryNumber:
          type: ["string", "null"]
        driverName:
          type: ["string", "null"]

    Driver:
      type: object
      required:
        - id
        - name
        - employeeId
        - phone
        - licenseNumber
        - status
        - hub
        - joiningDate
      properties:
        id:
          type: integer
        name:
          type: string
        employeeId:
          type: string
        phone:
          type: string
        licenseNumber:
          type: string
        licenseExpiry:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        emergencyContact:
          type: ["string", "null"]
        aadhaarNumber:
          type: ["string", "null"]
        panNumber:
          type: ["string", "null"]
        hub:
          type: string
        status:
          type: string
          enum: [active, inactive]
        joiningDate:
          type: string
        currentVehicleId:
          type: ["integer", "null"]
        deliveriesToday:
          type: integer
        deliveriesTotal:
          type: integer

    DriverInput:
      type: object
      required:
        - name
        - employeeId
        - phone
        - licenseNumber
        - hub
        - joiningDate
      properties:
        name:
          type: string
        employeeId:
          type: string
        phone:
          type: string
        licenseNumber:
          type: string
        licenseExpiry:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        emergencyContact:
          type: ["string", "null"]
        aadhaarNumber:
          type: ["string", "null"]
        panNumber:
          type: ["string", "null"]
        hub:
          type: string
        joiningDate:
          type: string

    DriverUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        licenseNumber:
          type: string
        licenseExpiry:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        emergencyContact:
          type: ["string", "null"]
        hub:
          type: string
        status:
          type: string
          enum: [active, inactive]

    Vehicle:
      type: object
      required:
        - id
        - vehicleNumber
        - vehicleType
        - capacity
        - fuelType
        - status
      properties:
        id:
          type: integer
        vehicleNumber:
          type: string
        vehicleType:
          type: string
          enum: [refrigerated_truck, chilled_van, ambient_truck, motorcycle]
        capacity:
          type: string
        fuelType:
          type: string
          enum: [diesel, petrol, cng, electric]
        gpsDeviceId:
          type: ["string", "null"]
        insuranceExpiry:
          type: ["string", "null"]
        fitnessExpiry:
          type: ["string", "null"]
        rcExpiry:
          type: ["string", "null"]
        pucExpiry:
          type: ["string", "null"]
        status:
          type: string
          enum: [available, in_use, maintenance, inactive]
        currentDriverId:
          type: ["integer", "null"]
        currentDriverName:
          type: ["string", "null"]

    VehicleInput:
      type: object
      required:
        - vehicleNumber
        - vehicleType
        - capacity
        - fuelType
      properties:
        vehicleNumber:
          type: string
        vehicleType:
          type: string
          enum: [refrigerated_truck, chilled_van, ambient_truck, motorcycle]
        capacity:
          type: string
        fuelType:
          type: string
          enum: [diesel, petrol, cng, electric]
        gpsDeviceId:
          type: ["string", "null"]
        insuranceExpiry:
          type: ["string", "null"]
        fitnessExpiry:
          type: ["string", "null"]

    VehicleUpdate:
      type: object
      properties:
        vehicleNumber:
          type: string
        vehicleType:
          type: string
          enum: [refrigerated_truck, chilled_van, ambient_truck, motorcycle]
        capacity:
          type: string
        fuelType:
          type: string
          enum: [diesel, petrol, cng, electric]
        gpsDeviceId:
          type: ["string", "null"]
        insuranceExpiry:
          type: ["string", "null"]
        fitnessExpiry:
          type: ["string", "null"]
        status:
          type: string
          enum: [available, in_use, maintenance, inactive]

    Customer:
      type: object
      required:
        - id
        - customerCode
        - companyName
        - address
        - contactPerson
        - phone
      properties:
        id:
          type: integer
        customerCode:
          type: string
        companyName:
          type: string
        address:
          type: string
        area:
          type: ["string", "null"]
        city:
          type: string
        contactPerson:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        deliveryWindow:
          type: ["string", "null"]
        specialInstructions:
          type: ["string", "null"]
        totalDeliveries:
          type: integer

    CustomerInput:
      type: object
      required:
        - customerCode
        - companyName
        - address
        - city
        - contactPerson
        - phone
      properties:
        customerCode:
          type: string
        companyName:
          type: string
        address:
          type: string
        area:
          type: ["string", "null"]
        city:
          type: string
        contactPerson:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        deliveryWindow:
          type: ["string", "null"]
        specialInstructions:
          type: ["string", "null"]

    CustomerUpdate:
      type: object
      properties:
        customerCode:
          type: string
        companyName:
          type: string
        address:
          type: string
        area:
          type: ["string", "null"]
        city:
          type: string
        contactPerson:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        deliveryWindow:
          type: ["string", "null"]
        specialInstructions:
          type: ["string", "null"]

    BulkCustomerImport:
      type: object
      required:
        - customers
      properties:
        customers:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            $ref: "#/components/schemas/CustomerInput"

    BulkCustomerResult:
      type: object
      required:
        - created
        - failed
        - errors
      properties:
        created:
          type: integer
        failed:
          type: integer
        errors:
          type: array
          items:
            type: object
            required:
              - row
              - message
            properties:
              row:
                type: integer
              message:
                type: string

    Delivery:
      type: object
      required:
        - id
        - deliveryNumber
        - orderNumber
        - status
        - priority
        - customerId
        - customerName
        - deliveryAddress
        - deliveryCity
        - deliveryDate
        - deliveryWindow
        - totalWeight
        - products
      properties:
        id:
          type: integer
        deliveryNumber:
          type: string
        orderNumber:
          type: string
        invoiceNumber:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, assigned, in_transit, delivered, failed, rescheduled]
        priority:
          type: string
          enum: [high, normal, low]
        customerId:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: ["string", "null"]
        deliveryAddress:
          type: string
        deliveryArea:
          type: ["string", "null"]
        deliveryCity:
          type: string
        deliveryDate:
          type: string
        deliveryWindow:
          type: string
        totalWeight:
          type: string
